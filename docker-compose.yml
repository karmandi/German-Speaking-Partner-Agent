version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGUAGE_LEVEL=${LANGUAGE_LEVEL:-A2}
      - DEBUG=false
    volumes:
      - ./backend/app/static:/app/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    # For development, use npm run dev
    # For production, the frontend is built into the backend container
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8000

volumes:
  uploads:
  audio:
